<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lost Pet Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Lost Pet Finder</h1>
  <p class="tagline">Admin Panel</p>
</header>

<nav>
  <a href="index.html">&larr; Back to Home</a>
</nav>

<main class="owner-main">

  <!-- ── Login ─────────────────────────────────────────── -->
  <section id="admin-login" class="owner-section">
    <h2>Admin Sign In</h2>
    <p class="section-hint">Enter your admin email and we'll send you a one-time sign-in link.</p>
    <form id="admin-login-form">
      <div class="form-field">
        <label for="admin-email">Admin Email</label>
        <input type="email" id="admin-email" required />
      </div>
      <div id="login-error" class="error-msg" hidden></div>
      <button type="submit">Send Magic Link</button>
    </form>
    <div id="login-sent" class="success-msg" hidden>
      Check your email and click the link to sign in.
    </div>
  </section>

  <!-- ── Admin panel ───────────────────────────────────── -->
  <section id="admin-panel" class="owner-section" hidden>
    <div class="admin-header">
      <h2>Admin Panel</h2>
      <button id="admin-sign-out" class="btn-outline">Sign Out</button>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="pets-tab">Lost Pets</button>
      <button class="admin-tab" data-tab="sightings-tab">Sightings</button>
      <button class="admin-tab" data-tab="stolen-tab">Stolen / Tracking</button>
    </div>

    <!-- Pets tab -->
    <div id="pets-tab" class="admin-tab-content">
      <div id="admin-pets-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- Sightings tab -->
    <div id="sightings-tab" class="admin-tab-content" hidden>
      <div id="admin-sightings-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- Stolen / Tracking tab -->
    <div id="stolen-tab" class="admin-tab-content" hidden>
      <div id="admin-stolen-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>
  </section>

</main>

<footer>
  <p>Lost Pet Finder &mdash; Helping neighbors help each other.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
